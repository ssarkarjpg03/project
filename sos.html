<!DOCTYPE html>
<html>
<head>
    <title>SOS Feature</title>
</head>
<body>
    <h2>SOS Feature</h2>
    <form id="sosForm" action="php/sos.php" method="post">
        <textarea name="message" placeholder="Type your SOS message here..." required></textarea><br><br>
        <input type="hidden" id="latitude" name="latitude">
        <input type="hidden" id="longitude" name="longitude">
        <input type="submit" value="Send SOS">
    </form>

    <script>
        document.getElementById('sosForm').addEventListener('submit', function(event) {
            event.preventDefault();

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    document.getElementById('latitude').value = position.coords.latitude;
                    document.getElementById('longitude').value = position.coords.longitude;
                    document.getElementById('sosForm').submit();
                }, function(error) {
                    alert('Error retrieving your location. Please try again.');
                    console.error(error);
                });
            } else {
                alert('Geolocation is not supported by your browser.');
            }
        });
    </script>
</body>
</html>
