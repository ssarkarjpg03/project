<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <link rel="stylesheet" href="css/emailotp.css">
    <script src="https://smtpjs.com/v3/smtp.js"></script>
</head>
<body>
    <div class="container">
        <h2>OTP Verification</h2>
        <p>Please enter the 4-digit OTP sent to your email:</p>
        <form action="#" method="post" id="otpForm">
            <div class="otp-input">
                <input type="text" maxlength="1" class="otp-field" name="otp[]" required>
                <input type="text" maxlength="1" class="otp-field" name="otp[]" required>
                <input type="text" maxlength="1" class="otp-field" name="otp[]" required>
                <input type="text" maxlength="1" class="otp-field" name="otp[]" required>
            </div>
            <input type="hidden" name="email" id="userEmail">
            <input type="hidden" name="generatedOtp" id="generatedOtp">
            <button type="submit">Verify</button>
        </form>
    </div>
</body>
<script src="#"></script>
</html>
